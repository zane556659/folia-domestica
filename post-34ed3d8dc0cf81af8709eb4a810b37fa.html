<p class="para">一年未換盆，順便換盆並檢查根系。根系尚可但無白根。原介質太貧瘠加上施肥不勤導致長勢差，希望換介質後好轉。

介質材料比例：
單純細顆粒 50%、桐生砂 30%、活性碳 15%、鈣粉 5%

設計邏輯：高透氣與石生模擬——排除赤玉土，完全依靠礦物間隙通氣；鈣粉強化細弱枝幹的木質化速度。
防禦目標：防止休眠期因環境濕度過高導致的「塊根心腐」。</p>
